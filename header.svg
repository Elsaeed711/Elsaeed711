<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230" fill="none" role="img">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1b26"/><stop offset="1" stop-color="#15151d"/>
    </linearGradient>
    <pattern id="scan" width="100%" height="5" patternUnits="userSpaceOnUse">
      <rect width="100%" height="1" fill="#7aa2f7" opacity="0.06"/>
    </pattern>
    <filter id="b"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>
  <rect width="900" height="230" fill="url(#sky)"/>
  <rect width="900" height="230" fill="url(#scan)"/>
  <g font-family="'JetBrains Mono','Courier New',monospace" font-weight="800" font-size="120" text-anchor="middle">
    <text x="450" y="150" fill="#f7768e" opacity="0.85" filter="url(#b)">VOID
      <animateTransform attributeName="transform" type="translate" values="0 0;-5 2;4 -2;-3 1;0 0;5 0;0 0" dur="2.4s" calcMode="discrete" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.4;0.85;0.6;0.85" dur="1.7s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="150" fill="#7dcfff" opacity="0.85" filter="url(#b)">VOID
      <animateTransform attributeName="transform" type="translate" values="0 0;5 -2;-4 2;3 -1;0 0;-5 0;0 0" dur="2.1s" calcMode="discrete" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.55;0.85;0.45;0.85" dur="1.3s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="150" fill="#c0caf5">VOID</text>
  </g>
  <text x="450" y="196" font-family="'JetBrains Mono',monospace" font-size="19" fill="#7aa2f7" text-anchor="middle" letter-spacing="3">
    // ACCESS GRANTED — ricer · networks · security
    <animate attributeName="opacity" values="1;0.35;1;0.8;1" dur="2.6s" repeatCount="indefinite"/>
  </text>
  <rect x="0" y="0" width="900" height="3" fill="#7aa2f7"/>
  <rect x="0" y="227" width="900" height="3" fill="#bb9af7"/>
</svg>
